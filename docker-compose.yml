services:
  postgres:
    image: postgres:16-alpine
    container_name: gantt-mind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gantt_mind}
      POSTGRES_USER: ${POSTGRES_USER:-gantt_mind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gantt_mind}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gantt_mind} -d ${POSTGRES_DB:-gantt_mind}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
